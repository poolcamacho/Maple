name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-release:
    name: Build unsigned .app
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Build
        run: |
          set -o pipefail
          xcodebuild \
            -project Maple.xcodeproj \
            -scheme Maple \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package .app into zip
        run: |
          cd build/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent Maple.app Maple.zip
          mv Maple.zip "$GITHUB_WORKSPACE/Maple-${GITHUB_REF_NAME:-dev}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Maple-${{ github.ref_name || 'dev' }}
          path: Maple-*.zip

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: Maple-*.zip
          generate_release_notes: true
          body: |
            > **Note:** this build is unsigned. macOS may warn that the app
            > is "damaged" or from an unidentified developer; remove the
            > quarantine attribute with `xattr -cr /Applications/Maple.app`
            > or build from source.
