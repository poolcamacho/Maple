name: Bug report
description: Something in Maple doesn't work as expected.
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open repo …
        2. Click on …
        3. Observe …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: e.g. 14.4.1
    validations:
      required: true
  - type: input
    id: maple
    attributes:
      label: Maple build
      description: Commit SHA or release tag you built from.
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant console output
      description: Any `[Maple] process.run() failed …` lines or Xcode console output.
      render: shell
    validations:
      required: false
