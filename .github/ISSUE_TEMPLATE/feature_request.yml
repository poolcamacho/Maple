name: Feature request
description: Suggest an improvement or a new capability.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What's the use case or pain point?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: How would you solve it? UI sketches and git command flows help.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other Git clients / approaches you evaluated.
    validations:
      required: false
